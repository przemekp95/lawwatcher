name: publish-images

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"

permissions:
  contents: read
  packages: write

jobs:
  host-images:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image_name: lawwatcher-api
            project_path: src/Server/LawWatcher.Api/LawWatcher.Api.csproj
            app_dll: LawWatcher.Api.dll
          - image_name: lawwatcher-portal
            project_path: src/Server/LawWatcher.Portal/LawWatcher.Portal.csproj
            app_dll: LawWatcher.Portal.dll
          - image_name: lawwatcher-worker-lite
            project_path: src/Workers/LawWatcher.Worker.Lite/LawWatcher.Worker.Lite.csproj
            app_dll: LawWatcher.Worker.Lite.dll
          - image_name: lawwatcher-worker-ai
            project_path: src/Workers/LawWatcher.Worker.Ai/LawWatcher.Worker.Ai.csproj
            app_dll: LawWatcher.Worker.Ai.dll
          - image_name: lawwatcher-worker-documents
            project_path: src/Workers/LawWatcher.Worker.Documents/LawWatcher.Worker.Documents.csproj
            app_dll: LawWatcher.Worker.Documents.dll
          - image_name: lawwatcher-worker-projection
            project_path: src/Workers/LawWatcher.Worker.Projection/LawWatcher.Worker.Projection.csproj
            app_dll: LawWatcher.Worker.Projection.dll
          - image_name: lawwatcher-worker-notifications
            project_path: src/Workers/LawWatcher.Worker.Notifications/LawWatcher.Worker.Notifications.csproj
            app_dll: LawWatcher.Worker.Notifications.dll
          - image_name: lawwatcher-worker-replay
            project_path: src/Workers/LawWatcher.Worker.Replay/LawWatcher.Worker.Replay.csproj
            app_dll: LawWatcher.Worker.Replay.dll

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        if: startsWith(github.ref, 'refs/tags/')
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ matrix.image_name }}
          tags: |
            type=sha,format=long,prefix=sha-
            type=ref,event=branch
            type=ref,event=tag
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ops/compose/Dockerfile.host
          build-args: |
            PROJECT_PATH=${{ matrix.project_path }}
            APP_DLL=${{ matrix.app_dll }}
          platforms: ${{ startsWith(github.ref, 'refs/tags/') && 'linux/amd64,linux/arm64' || 'linux/amd64' }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.image_name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image_name }}

  ghcr-image-smoke:
    needs: host-images
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image-first smoke
        env:
          GITHUB_REPOSITORY_OWNER: ${{ github.repository_owner }}
          GITHUB_SHA: ${{ github.sha }}
        run: bash ops/run-ghcr-image-smoke.sh

  ghcr-ops-proofs:
    if: github.event_name == 'workflow_dispatch'
    needs: ghcr-image-smoke
    runs-on: ubuntu-latest
    env:
      IMAGE_TAG: sha-${{ github.sha }}
      LAWWATCHER_API_IMAGE: ghcr.io/${{ github.repository_owner }}/lawwatcher-api:sha-${{ github.sha }}
      LAWWATCHER_PORTAL_IMAGE: ghcr.io/${{ github.repository_owner }}/lawwatcher-portal:sha-${{ github.sha }}
      LAWWATCHER_WORKER_LITE_IMAGE: ghcr.io/${{ github.repository_owner }}/lawwatcher-worker-lite:sha-${{ github.sha }}
      LAWWATCHER_WORKER_AI_IMAGE: ghcr.io/${{ github.repository_owner }}/lawwatcher-worker-ai:sha-${{ github.sha }}
      LAWWATCHER_WORKER_DOCUMENTS_IMAGE: ghcr.io/${{ github.repository_owner }}/lawwatcher-worker-documents:sha-${{ github.sha }}
      LAWWATCHER_WORKER_NOTIFICATIONS_IMAGE: ghcr.io/${{ github.repository_owner }}/lawwatcher-worker-notifications:sha-${{ github.sha }}
      LAWWATCHER_WORKER_PROJECTION_IMAGE: ghcr.io/${{ github.repository_owner }}/lawwatcher-worker-projection:sha-${{ github.sha }}
      LAWWATCHER_WORKER_REPLAY_IMAGE: ghcr.io/${{ github.repository_owner }}/lawwatcher-worker-replay:sha-${{ github.sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: RabbitMQ write-path nonblocking smoke
        run: bash ops/run-rabbitmq-write-path-nonblocking-smoke.sh

      - name: Retention smoke
        run: bash ops/run-retention-smoke.sh

      - name: Structured-log proof
        run: bash ops/run-structured-log-proof.sh
