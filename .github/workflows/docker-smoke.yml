name: docker-smoke

on:
  workflow_dispatch:
  pull_request:

jobs:
  docker_contract:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify Docker-first contract
        run: bash ops/verify-docker-contract.sh

  dev_laptop_linux:
    needs: docker_contract
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Baseline smoke
        run: bash ops/run-docker-dev-laptop-smoke.sh --build-local

      - name: AI smoke
        run: bash ops/run-docker-dev-laptop-smoke.sh --build-local --include-ai

  host_health_linux:
    needs: docker_contract
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Host health smoke
        run: bash ops/run-host-health-smoke.sh --build-local

  full_host_linux:
    if: github.event_name == 'workflow_dispatch'
    needs: docker_contract
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Full-host OpenSearch smoke
        run: bash ops/run-docker-full-host-smoke.sh --build-local --include-opensearch

  ops_proofs_linux:
    if: github.event_name == 'workflow_dispatch'
    needs: docker_contract
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: RabbitMQ write-path nonblocking smoke
        run: bash ops/run-rabbitmq-write-path-nonblocking-smoke.sh --build-local

      - name: Retention smoke
        run: bash ops/run-retention-smoke.sh --build-local

      - name: Structured-log proof
        run: bash ops/run-structured-log-proof.sh --build-local
