name: docker-smoke

on:
  workflow_dispatch:
  pull_request:

jobs:
  dev_laptop_linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Baseline smoke
        run: bash ops/run-docker-dev-laptop-smoke.sh --build-local

      - name: AI smoke
        run: bash ops/run-docker-dev-laptop-smoke.sh --build-local --include-ai

  full_host_linux:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Full-host OpenSearch smoke
        run: bash ops/run-docker-full-host-smoke.sh --build-local --include-opensearch
