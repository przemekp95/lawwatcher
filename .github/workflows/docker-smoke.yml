name: docker-smoke

on:
  workflow_dispatch:
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  dotnet_validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore LawWatcher.slnx

      - name: Build
        run: dotnet build LawWatcher.slnx -c Release --no-restore

      - name: Test
        run: dotnet test LawWatcher.slnx -c Release --no-build --logger "trx;LogFileName=dotnet-test.trx" --results-directory test-results --collect:"XPlat Code Coverage"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dotnet-test-results
          path: test-results
          if-no-files-found: warn

  docker_contract:
    needs: dotnet_validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify Docker-first contract
        run: bash ops/verify-docker-contract.sh

  dev_linux:
    needs: docker_contract
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Baseline smoke
        run: bash ops/run-docker-dev-smoke.sh --build-local

      - name: AI smoke
        run: bash ops/run-docker-dev-smoke.sh --build-local --include-ai

  host_health_linux:
    needs: docker_contract
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Host health smoke
        run: bash ops/run-host-health-smoke.sh --build-local

  production_linux:
    if: github.event_name == 'workflow_dispatch'
    needs: docker_contract
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Production OpenSearch smoke
        run: bash ops/run-docker-production-smoke.sh --build-local

  ops_proofs_linux:
    if: github.event_name == 'workflow_dispatch'
    needs: docker_contract
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: RabbitMQ write-path nonblocking smoke
        run: bash ops/run-rabbitmq-write-path-nonblocking-smoke.sh --build-local

      - name: Retention smoke
        run: bash ops/run-retention-smoke.sh --build-local

      - name: Signed webhook smoke
        run: bash ops/run-signed-webhook-smoke.sh --build-local

      - name: Structured-log proof
        run: bash ops/run-structured-log-proof.sh --build-local

      - name: Poison DLQ recovery smoke
        run: bash ops/run-poison-dlq-recovery-smoke.sh --build-local
